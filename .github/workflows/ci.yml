name: CI

# Pull-request gate: typecheck, build all three images, and scan them for
# known CVEs. Nothing is pushed or deployed here — this just has to pass
# before a PR can merge to main (enforce via branch protection).

on:
  pull_request:
    branches: [main]

jobs:
  lint-build-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (lint)
        run: npm run lint

      - name: Build images
        run: |
          docker build -f apps/api/Dockerfile -t boneless-api:ci .
          docker build -f apps/bot/Dockerfile -t boneless-bot:ci .
          docker build -f apps/web/Dockerfile \
            --build-arg VITE_API_BASE_URL=https://api.bonelessisland.com \
            -t boneless-web:ci .

      # Block the merge on HIGH/CRITICAL CVEs that have a fix available
      # (exit-code 1). ignore-unfixed:true means unpatchable base-image noise
      # won't block — only CVEs you can actually act on do.
      - name: Trivy scan — api
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: boneless-api:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          # npm ships bundled inside the node base image here and is never run
          # at container runtime (CMD runs the app via tsx), so its bundled deps
          # aren't part of the service's attack surface. Scope them out — the
          # app's own node_modules and the OS layer are still scanned.
          skip-dirs: usr/local/lib/node_modules/npm

      - name: Trivy scan — bot
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: boneless-bot:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          # npm ships bundled inside the node base image here and is never run
          # at container runtime (CMD runs the app via tsx), so its bundled deps
          # aren't part of the service's attack surface. Scope them out — the
          # app's own node_modules and the OS layer are still scanned.
          skip-dirs: usr/local/lib/node_modules/npm

      - name: Trivy scan — web
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: boneless-web:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          # npm ships bundled inside the node base image here and is never run
          # at container runtime (CMD runs the app via tsx), so its bundled deps
          # aren't part of the service's attack surface. Scope them out — the
          # app's own node_modules and the OS layer are still scanned.
          skip-dirs: usr/local/lib/node_modules/npm
