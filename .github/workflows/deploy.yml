name: Deploy

# On merge to main: build + push the three images to GHCR (tagged with the
# commit SHA + latest), then tell the EC2 box to pull that SHA and restart —
# all via AWS SSM (no SSH, no stored AWS keys; auth is GitHub OIDC).
#
# Required repo settings (Settings → Secrets and variables → Actions → Variables):
#   AWS_DEPLOY_ROLE_ARN  arn:aws:iam::<acct>:role/github-actions-deploy
#   AWS_REGION           us-east-1
#   INSTANCE_ID          i-0dd84dd99c8899f32
#
# GHCR packages (boneless-api/bot/web) must be set to Public once, after the
# first push, so the box can pull them anonymously (no creds on the box).

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # mint the OIDC token for AWS
  packages: write # push to GHCR

jobs:
  build-push-deploy:
    # ARM runner: the prod box is arm64 (EC2 t4g/Graviton), so images must be
    # built arm64-native. GitHub's arm64 hosted runners are free for public
    # repos. (Default x86 runners produce amd64 images the box can't run:
    # "no matching manifest for linux/arm64/v8".)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build + push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/d0nm3ga/boneless-api:latest
            ghcr.io/d0nm3ga/boneless-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build + push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/bot/Dockerfile
          push: true
          tags: |
            ghcr.io/d0nm3ga/boneless-bot:latest
            ghcr.io/d0nm3ga/boneless-bot:${{ github.sha }}
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

      - name: Build + push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          build-args: |
            VITE_API_BASE_URL=https://api.bonelessisland.com
          push: true
          tags: |
            ghcr.io/d0nm3ga/boneless-web:latest
            ghcr.io/d0nm3ga/boneless-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to box via SSM
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${GITHUB_SHA::7}" \
            --parameters commands='["set -e","export HOME=/root","cd /home/ssm-user/thebonelessisland","git config --global --add safe.directory /home/ssm-user/thebonelessisland","git fetch origin main","git reset --hard origin/main","export IMAGE_TAG=${{ github.sha }}","docker compose -f infra/docker-compose.yml --profile prod pull","docker compose -f infra/docker-compose.yml --profile prod up -d","docker image prune -f"]' \
            --query "Command.CommandId" --output text)
          echo "SSM command id: $CMD_ID"
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "${{ vars.INSTANCE_ID }}" || true
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.INSTANCE_ID }}" --query Status --output text)
          echo "----- stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.INSTANCE_ID }}" --query StandardOutputContent --output text
          echo "----- stderr -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.INSTANCE_ID }}" --query StandardErrorContent --output text
          echo "deploy status: $STATUS"
          [ "$STATUS" = "Success" ]
