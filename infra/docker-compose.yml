# Postgres for local dev AND the full single-box production stack.
#
# DEV (just the database, app runs on the host via `npm run dev`):
#   docker compose -f infra/docker-compose.yml up -d            # postgres only
#   — or the shortcut —  npm run db:up
#
# PROD (edge + api + bot + postgres, all on one EC2 box):
#   docker compose -f infra/docker-compose.yml --profile prod up -d --build
#
# The api/bot/web services are gated behind the `prod` profile so the dev
# `db:up` shortcut keeps starting only Postgres.
#
# Env (prod): every app service reads ../.env. Two supported shapes
# (see .env.example):
#   • env-file mode — .env holds all secrets, SECRETS_SOURCE unset.
#   • SSM mode      — .env holds only NODE_ENV=production, SECRETS_SOURCE=ssm,
#                     AWS_REGION, POSTGRES_PASSWORD; api/bot pull the rest from
#                     /boneless/prod/* via the EC2 instance role at startup.
#
# In prod, DATABASE_URL must use the compose service name as host:
#   postgresql://postgres:<pw>@postgres:5432/boneless

# Cap container log files so they can't fill the box's disk (10MB × 3 files
# per service). Each service references this via `logging: *default-logging`.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    # pgvector/pgvector:pg16 is the official Postgres 16 image with the
    # pgvector extension pre-installed. Same upstream PG, just adds the
    # CREATE EXTENSION vector path. Existing volume + data carries over
    # cleanly when swapping from postgres:16 → pgvector/pgvector:pg16.
    image: pgvector/pgvector:pg16
    container_name: boneless-postgres
    restart: unless-stopped
    logging: *default-logging
    # POSTGRES_PASSWORD comes from the same .env as the app services. The path
    # is relative to THIS compose file (→ repo root), so it resolves no matter
    # which directory `docker compose` is invoked from. Using env_file instead
    # of `${POSTGRES_PASSWORD}` interpolation avoids the footgun where compose
    # looks for `.env` in the compose file's directory (infra/) rather than the
    # repo root and silently falls back to a default password — which mismatches
    # the app's DATABASE_URL. Requires a .env at the repo root (dev: copy from
    # .env.example; prod: see DEPLOY.md). First-time volume init pins the
    # password; to rotate: `docker compose down -v`, change it, up, re-migrate.
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: boneless
      POSTGRES_USER: postgres
    ports:
      # Bind to loopback only. Dev (host app) reaches it at localhost:5432.
      # In prod the app containers use the internal network, not this mapping,
      # so nothing on the box's public interface ever exposes Postgres.
      - "127.0.0.1:5432:5432"
    volumes:
      - boneless_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d boneless"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles: ["prod"]
    # Prod pulls a prebuilt image from GHCR (CI builds + pushes it). IMAGE_TAG
    # is set inline by the deploy command (the commit SHA); falls back to
    # `latest` for manual runs. `build:` is kept for local/CI image builds —
    # `docker compose build` tags the result with this same image name.
    image: ghcr.io/the-boneless-island/boneless-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: boneless-api
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    # No published ports — Caddy (web service) reaches it as http://api:3000 on
    # the internal network. Migrations run automatically on boot (server.ts).
    expose:
      - "3000"

  bot:
    profiles: ["prod"]
    image: ghcr.io/the-boneless-island/boneless-bot:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/bot/Dockerfile
    container_name: boneless-bot
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ../.env
    depends_on:
      - api
    # Outbound only (Discord gateway). No ports.

  web:
    profiles: ["prod"]
    image: ghcr.io/the-boneless-island/boneless-web:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the SPA at build time. Must match the public API hostname.
        VITE_API_BASE_URL: https://api.bonelessisland.com
    container_name: boneless-web
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Cloudflare Origin CA cert + key (see DEPLOY.md). Read-only.
      - ./certs:/certs:ro
      # Persist Caddy's state dir.
      - boneless_caddy_data:/data

volumes:
  boneless_pg_data:
  boneless_caddy_data:
